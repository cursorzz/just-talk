name: Build and release desktop installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: Windows x64
            runner: windows-latest
            rust_target: ""
            args: --bundles nsis
          - name: Debian x64
            runner: ubuntu-22.04
            rust_target: ""
            args: --bundles deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: desktop-${{ runner.os }}-${{ matrix.rust_target || 'native' }}
          add-job-id-key: "false"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload installer
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: justtalk-[platform]-[arch]-[bundle]

  build-arch:
    name: Arch Linux x64
    runs-on: ubuntu-22.04
    container: archlinux:base-devel
    timeout-minutes: 60

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            git \
            nodejs \
            npm \
            rustup \
            webkit2gtk-4.1 \
            libappindicator-gtk3 \
            librsvg \
            alsa-lib \
            openssl \
            patchelf \
            xdg-utils
          rustup default stable
          useradd --create-home builder

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Cache npm downloads
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: desktop-arch-linux-x86_64
          add-job-id-key: "false"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Arch binary
        run: npm run tauri build -- --no-bundle

      - name: Build Arch package
        working-directory: packaging/arch
        run: |
          chown -R builder:builder .
          runuser -u builder -- makepkg --noconfirm --nodeps --force

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: justtalk-linux-x64-arch
          path: packaging/arch/*.pkg.tar.zst
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, build-arch]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate release tag and version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(awk '
            /^\[package\]$/ { in_package=1; next }
            /^\[/ { in_package=0 }
            in_package && /^version = / { gsub(/[\" ]/, "", $3); print $3; exit }
          ' src-tauri/Cargo.toml)"
          if [[ "$package_version" == "$tauri_version" && "$package_version" == "$cargo_version" ]]; then
            :
          else
            echo "Version mismatch: package=$package_version tauri=$tauri_version cargo=$cargo_version" >&2
            exit 1
          fi
          expected_tag="v$package_version"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected_tag" >&2
            exit 1
          fi

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: justtalk-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          while IFS= read -r -d '' file; do
            cp "$file" "release-files/$(basename "$file")"
          done < <(find release-assets -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.deb' -o -name '*.pkg.tar.zst' \
          \) -print0)
          if ! find release-files -type f -mindepth 1 -print -quit | grep -q .; then
            echo "No release installers were downloaded" >&2
            exit 1
          fi
          (
            cd release-files
            sha256sum -- * > SHA256SUMS.txt
          )
          find release-files -maxdepth 1 -type f -print

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-files -maxdepth 1 -type f -print0)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "JustTalk $RELEASE_TAG" \
              --generate-notes
          fi
